name: Dependency Review

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Review dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
